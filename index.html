
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSG91 OTP Tester</title>
<style>
body{
    font-family: Arial, sans-serif;
    max-width: 500px;
    margin: 40px auto;
    padding: 20px;
}
input,button{
    width:100%;
    padding:12px;
    margin:8px 0;
    box-sizing:border-box;
}
button{
    cursor:pointer;
}
pre{
    background:#f5f5f5;
    padding:10px;
    border-radius:8px;
    white-space:pre-wrap;
}
</style>
</head>
<body>

<h2>MSG91 OTP Widget Tester</h2>

<input id="widgetId"
       value="366678645a74303732303539"
       placeholder="Widget ID">

<input id="tokenAuth"
       placeholder="Token Auth">

<input id="mobile"
       placeholder="919876543210">

<button onclick="startOTP()">Send OTP</button>

<pre id="result">Waiting...</pre>

<script>
function startOTP(){

    const widgetId = document.getElementById('widgetId').value.trim();
    const tokenAuth = document.getElementById('tokenAuth').value.trim();
    const mobile = document.getElementById('mobile').value.trim();

    const configuration = {
        widgetId: widgetId,
        tokenAuth: tokenAuth,
        identifier: mobile,

        success: function(data){
            document.getElementById('result').textContent =
                JSON.stringify(data,null,2);
        },

        failure: function(error){
            document.getElementById('result').textContent =
                JSON.stringify(error,null,2);
        }
    };

    window.initSendOTP(configuration);
}

(function loadOtpScript(urls) {
    let i = 0;

    function attempt() {
        const s = document.createElement('script');
        s.src = urls[i];
        s.async = true;

        s.onerror = () => {
            i++;
            if(i < urls.length){
                attempt();
            }
        };

        document.head.appendChild(s);
    }

    attempt();
})([
    'https://verify.msg91.com/otp-provider.js',
    'https://verify.phone91.com/otp-provider.js'
]);
</script>

</body>
</html>
